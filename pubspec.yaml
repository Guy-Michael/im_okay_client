name: im_okay
description: A check-in app for times of peril.
publish_to: 'none'
version: 1.0.2+7

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  provider: ^6.1.5
  go_router: ^14.3.0
  intl: any
  http: ^1.1.0
  firebase_messaging: ^15.1.5
  equatable: ^2.0.5
  getwidget: ^5.0.0
  flutter_localizations:
    sdk: flutter
  fluttertoast: ^8.2.4
  google_sign_in: ^6.2.1
  sign_in_button: ^3.2.0
  firebase_ui_auth: ^1.14.0
  firebase_ui_oauth_google: ^1.3.2
  json: ^0.20.2
  geolocator: ^13.0.2
  point_in_polygon: ^1.0.0
  flutter_local_notifications: ^18.0.1
  localstorage: ^5.0.0
  logging: ^1.3.0
  just_logcat: ^0.0.2+3
  flutter_dotenv: ^5.2.1
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  get_it: ^9.2.1
  settings_ui: ^2.0.1
  introduction_screen: ^4.0.0
  flutter_contacts: ^1.1.9+2
  permission_handler: ^12.0.1
  phone_numbers_parser: ^9.0.21
  crypto: ^3.0.7

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.2
  build_runner: ^2.4.6
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - local.env
    - Assets/Kin/
    - Assets/Main/
    - Assets/Onboarding/